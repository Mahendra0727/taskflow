version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - mock-api

  mock-api:
    build:
      context: ./mock-api
      dockerfile: Dockerfile
    ports:
      - "${MOCK_API_PORT}:4000"
    volumes:
      - ./mock-api/db.json:/app/db.json
